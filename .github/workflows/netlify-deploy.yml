name: Deploy ExpenseKit to Netlify

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: netlify-expensekit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://expensekit17.netlify.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deploy env
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "${NEXT_PUBLIC_API_URL}" ]; then
            echo "::error::Set NEXT_PUBLIC_API_URL in GitHub repo Variables."
            exit 1
          fi
          if [ -z "${NETLIFY_AUTH_TOKEN}" ] || [ -z "${NETLIFY_SITE_ID}" ]; then
            echo "::error::Set NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID in GitHub Secrets."
            exit 1
          fi
          echo "API URL: ${NEXT_PUBLIC_API_URL}"
          echo "Site ID: ${NETLIFY_SITE_ID}"

      - name: Build for Netlify
        run: npx netlify-cli@latest build

      - name: Deploy to Netlify (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx netlify-cli@latest deploy --prod --no-build
        timeout-minutes: 10

      - name: Build and deploy preview
        if: github.event_name == 'pull_request'
        run: |
          npx netlify-cli@latest build
          npx netlify-cli@latest deploy --alias deploy-preview-${{ github.event.pull_request.number }} --no-build
        timeout-minutes: 10

      - name: Build and deploy (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          npx netlify-cli@latest build
          npx netlify-cli@latest deploy --prod --no-build
        timeout-minutes: 10
